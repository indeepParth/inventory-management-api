name: .NET CI

on:
  push:
    branches:
      - main
      - develop
      - "feature/**"

  pull_request:
    branches:
      - main
      - develop

jobs:
  build-and-test:

    runs-on: ubuntu-latest

    steps:

      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '8.0.x'

      - name: Restore Packages
        run: dotnet restore InventoryManagement.sln

      - name: Build Solution
        run: dotnet build InventoryManagement.sln --no-restore --configuration Release

      - name: Run Tests
        run: dotnet test InventoryManagement.sln --no-build --configuration Release