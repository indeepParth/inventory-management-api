version: "3.9"

services:

  inventory-api:

    container_name: inventory-api

    build:
      context: .
      dockerfile: Dockerfile

    ports:
      - "8080:8080"

    environment:
      ASPNETCORE_ENVIRONMENT: Development
      ConnectionStrings__DefaultConnection: Data Source=Data/inventory.db
      Jwt__Key: ${Jwt__Key:?Set Jwt__Key before starting the container}

    volumes:
      - ./Data:/app/Data
      - ./Logs:/app/Logs

    restart: unless-stopped
